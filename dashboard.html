    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;

    .navbar {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }

    .navbar-brand {
        font-size: 24px;
        font-weight: 700;
        color: #667eea;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .user-email {
        color: #666;
        font-size: 14px;
    }

    .btn-logout {
        background: #fee2e2;
        color: #991b1b;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
    }

    .btn-logout:hover {
        background: #fecaca;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px;
    }

    .welcome {
        background: white;
        border-radius: 20px;
        padding: 40px;
        margin-bottom: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .welcome h1 {
        font-size: 32px;
        margin-bottom: 10px;
        color: #333;
    }

    .welcome p {
        color: #666;
        font-size: 16px;
    }

    .stats-grid {

        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

        border-radius: 15px;
        padding: 25px;

        transition: transform 0.3s;
    }

    .stat-card h3 {

        letter-spacing: 1px;

    }

        font-weight: 700;

    .stat-card.danger .number { color: #ef4444; }

    }

    .btn-primary {

<!-- Main Container -->
<div class="container">
    <!-- Welcome Card -->
    <div class="welcome">
        <h1>¡Bienvenido de vuelta! 👋</h1>
        <p>Gestiona tu inventario de forma simple y eficiente</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card primary">
            <h3>Total Productos</h3>
            <div class="number" id="totalProducts">0</div>
        </div>
        <div class="stat-card warning">
            <h3>Stock Bajo</h3>
            <div class="number" id="lowStock">0</div>
        </div>
        <div class="stat-card danger">
            <h3>Stock Crítico</h3>
            <div class="number" id="criticalStock">0</div>
        </div>
    </div>

    <!-- Actions Grid -->
    <div class="actions-grid">
        <!-- Ver Productos -->
        <div class="action-card">
            <h2>📦 Mis Productos</h2>
            <a href="productos.html" class="btn btn-primary">
                Ver y Gestionar Productos
            </a>
        </div>

        <!-- Registrar Venta -->
        <div class="action-card">
            <h2>🛒 Registrar Venta</h2>
            
            <div id="saleAlert" style="display: none;"></div>
            
            <form id="saleForm">
                <div class="form-group">
                    <label for="productSelect">Producto</label>
                    <select id="productSelect" required>
                        <option value="">Selecciona un producto...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="quantity">Cantidad</label>
                    <input 
                        type="number" 
                        id="quantity" 
                        min="1" 
                        placeholder="Ej: 5"
                        required
                    >
                </div>
                
                <button type="submit" class="btn btn-primary" id="saleBtn">
                    Registrar Venta
                </button>
            </form>
        </div>
    </div>

    <!-- Products List -->
    <div class="products-list">
        <h2>📋 Productos Recientes</h2>
        <div id="productsContainer">
            <div class="loading">
                <div class="spinner"></div>
                Cargando productos...
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://api-inventarioo-production.up.railway.app';

    // Verificar autenticación
    const token = localStorage.getItem('token');
    const userEmail = localStorage.getItem('usuario');

    if (!token) {
        window.location.href = 'index.html';
    }

    // Mostrar email del usuario
    document.getElementById('userEmail').textContent = userEmail || 'Usuario';

    // ═══════════════════════════════════════════════════════
    // CARGAR PRODUCTOS
    // ═══════════════════════════════════════════════════════
    async function loadProducts() {
        try {
            const response = await fetch(`${API_URL}/products`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
                return;
            }

            if (!response.ok) {
                throw new Error('Error al cargar productos');
            }

            const data = await response.json();
            const products = Array.isArray(data) ? data : (data.products || []);

            updateStats(products);
            updateProductsList(products);
            updateProductSelect(products);

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('productsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <p>Error al cargar productos</p>
                </div>
            `;
        }
    }

    // ═══════════════════════════════════════════════════════
    // ACTUALIZAR ESTADÍSTICAS
    // ═══════════════════════════════════════════════════════
    function updateStats(products) {
        const total = products.length;
        const lowStock = products.filter(p => p.stock_actual <= p.stock_minimo).length;
        const criticalStock = products.filter(p => p.stock_actual < p.stock_minimo * 0.5).length;

        document.getElementById('totalProducts').textContent = total;
        document.getElementById('lowStock').textContent = lowStock;
        document.getElementById('criticalStock').textContent = criticalStock;
    }

    // ═══════════════════════════════════════════════════════
    // ACTUALIZAR LISTA DE PRODUCTOS
    // ═══════════════════════════════════════════════════════
    function updateProductsList(products) {
        const container = document.getElementById('productsContainer');

        if (products.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>No tienes productos registrados</p>
                    <p style="font-size: 14px; margin-top: 10px;">
                        <a href="productos.html" style="color: #667eea;">Agregar primer producto</a>
                    </p>
                </div>
            `;
            return;
        }

        // Mostrar solo los primeros 5
        const recentProducts = products.slice(0, 5);

        container.innerHTML = recentProducts.map(product => {
            let badge = 'stock-ok';
            let badgeText = '✅ OK';

            if (product.stock_actual <= product.stock_minimo) {
                badge = 'stock-warning';
                badgeText = '⚠️ Bajo';
            }

            if (product.stock_actual < product.stock_minimo * 0.5) {
                badge = 'stock-danger';
                badgeText = '🚨 Crítico';
            }

            return `
                <div class="product-item">
                    <div class="product-info">
                        <h3>${product.nombre}</h3>
                        <p>SKU: ${product.sku} | Stock: ${product.stock_actual} unidades</p>
                    </div>
                    <span class="stock-badge ${badge}">${badgeText}</span>
                </div>
            `;
        }).join('');

        if (products.length > 5) {
            container.innerHTML += `
                <div style="text-align: center; padding: 20px;">
                    <a href="productos.html" style="color: #667eea; text-decoration: none; font-weight: 600;">
                        Ver todos los productos →
                    </a>
                </div>
            `;
        }
    }

    // ═══════════════════════════════════════════════════════
    // ACTUALIZAR SELECT DE PRODUCTOS
    // ═══════════════════════════════════════════════════════
    function updateProductSelect(products) {
        const select = document.getElementById('productSelect');
        
        // Limpiar opciones anteriores (excepto la primera)
        select.innerHTML = '<option value="">Selecciona un producto...</option>';

        // Agregar productos
        products.forEach(product => {
            const option = document.createElement('option');
            option.value = product.id;
            option.textContent = `${product.nombre} (Stock: ${product.stock_actual})`;
            option.dataset.stock = product.stock_actual;
            select.appendChild(option);
        });
    }

    // ═══════════════════════════════════════════════════════
    // REGISTRAR VENTA
    // ═══════════════════════════════════════════════════════
    document.getElementById('saleForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('saleBtn');
        const alert = document.getElementById('saleAlert');
        const productId = document.getElementById('productSelect').value;
        const quantity = parseInt(document.getElementById('quantity').value);

        if (!productId) {
            alert.className = 'alert alert-error';
            alert.textContent = '⚠️ Selecciona un producto';
            alert.style.display = 'block';
            return;
        }

        // Verificar stock disponible
        const selectedOption = document.querySelector(`#productSelect option[value="${productId}"]`);
        const availableStock = parseInt(selectedOption.dataset.stock);

        if (quantity > availableStock) {
            alert.className = 'alert alert-error';
            alert.textContent = `⚠️ Stock insuficiente. Disponible: ${availableStock}`;
            alert.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Registrando...';
        alert.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}/sales`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    producto_id: parseInt(productId),
                    cantidad: quantity
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert.className = 'alert alert-success';
                alert.textContent = '✅ Venta registrada exitosamente';
                alert.style.display = 'block';

                // Limpiar formulario
                document.getElementById('saleForm').reset();

                // Recargar productos
                await loadProducts();

                setTimeout(() => {
                    alert.style.display = 'none';
                }, 3000);
            } else {
                throw new Error(data.detail || 'Error al registrar venta');
            }
        } catch (error) {
            alert.className = 'alert alert-error';
            alert.textContent = '❌ ' + error.message;
            alert.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Registrar Venta';
        }
    });

    // ═══════════════════════════════════════════════════════
    // CERRAR SESIÓN
    // ═══════════════════════════════════════════════════════
    function cerrarSesion() {
        localStorage.removeItem('token');
        localStorage.removeItem('usuario');
        window.location.href = 'index.html';
    }

    // ═══════════════════════════════════════════════════════
    // INICIALIZAR
    // ═══════════════════════════════════════════════════════
    loadProducts();
</script>
