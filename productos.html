<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Productos - Inventario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        h1 {
            color: #333;
            font-size: 28px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 112, 154, 0.4);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .product-card.stock-bajo {
            border-color: #ff6b6b;
            background: #fff5f5;
        }

        .product-name {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .product-sku {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .product-stock {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stock-item {
            text-align: center;
        }

        .stock-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stock-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stock-value.bajo {
            color: #ff6b6b;
        }

        .stock-value.ok {
            color: #51cf66;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h2 {
            color: #333;
            font-size: 24px;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Mis Productos</h1>
            <div>
                <a href="registrar-venta.html" class="btn btn-primary">💰 Registrar Venta</a>
                <a href="crear-producto.html" class="btn btn-primary">➕ Nuevo Producto</a>
            </div>
        </div>

        <div id="mensajes"></div>
        <div id="loading" class="loading">Cargando productos...</div>
        <div id="productos" class="products-grid"></div>
    </div>

    <!-- MODAL REPONER STOCK -->
    <div id="modalReponer" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📦 Reponer Stock</h2>
                <span class="close" onclick="cerrarModalReponer()">&times;</span>
            </div>
            <div class="form-group">
                <label>Producto:</label>
                <input type="text" id="productoNombreReponer" readonly>
            </div>
            <div class="form-group">
                <label>Stock Actual:</label>
                <input type="number" id="stockActualReponer" readonly>
            </div>
            <div class="form-group">
                <label>Cantidad a Reponer:</label>
                <input type="number" id="cantidadReponer" min="1" placeholder="Ej: 50" required>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="cerrarModalReponer()">Cancelar</button>
                <button class="btn btn-success" onclick="confirmarReponer()">✅ Reponer</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api-inventarioo-production.up.railway.app';
        let productoSeleccionado = null;

        // Cargar productos al iniciar
        window.addEventListener('DOMContentLoaded', cargarProductos);

        async function cargarProductos() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/products`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al cargar productos');
                }

                const data = await response.json();
                mostrarProductos(data.products);
                
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al cargar los productos');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function mostrarProductos(productos) {
            const container = document.getElementById('productos');
            
            if (productos.length === 0) {
                container.innerHTML = '<div class="alert alert-warning">No tienes productos registrados. ¡Crea tu primer producto!</div>';
                return;
            }

            container.innerHTML = productos.map(producto => {
                const stockBajo = producto.stock_actual < producto.stock_minimo;
                const stockClass = stockBajo ? 'bajo' : 'ok';
                const cardClass = stockBajo ? 'stock-bajo' : '';

                return `
                    <div class="product-card ${cardClass}">
                        <div class="product-name">${producto.nombre}</div>
                        <div class="product-sku">SKU: ${producto.sku}</div>
                        
                        <div class="product-stock">
                            <div class="stock-item">
                                <div class="stock-label">Stock Actual</div>
                                <div class="stock-value ${stockClass}">${producto.stock_actual}</div>
                            </div>
                            <div class="stock-item">
                                <div class="stock-label">Stock Mínimo</div>
                                <div class="stock-value">${producto.stock_minimo}</div>
                            </div>
                        </div>

                        ${stockBajo ? '<div class="alert alert-warning">⚠️ Stock bajo mínimo</div>' : ''}

                        <div class="product-actions">
                            <button class="btn btn-success" onclick="abrirModalReponer(${producto.id}, '${producto.nombre}', ${producto.stock_actual})">
                                📦 Reponer
                            </button>
                            <button class="btn btn-warning" onclick="editarProducto(${producto.id})">
                                ✏️ Editar
                            </button>
                            <button class="btn btn-danger" onclick="eliminarProducto(${producto.id}, '${producto.nombre}')">
                                🗑️ Eliminar
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // FUNCIONES DEL MODAL REPONER
        function abrirModalReponer(id, nombre, stockActual) {
            productoSeleccionado = id;
            document.getElementById('productoNombreReponer').value = nombre;
            document.getElementById('stockActualReponer').value = stockActual;
            document.getElementById('cantidadReponer').value = '';
            document.getElementById('modalReponer').style.display = 'block';
        }

        function cerrarModalReponer() {
            document.getElementById('modalReponer').style.display = 'none';
            productoSeleccionado = null;
        }

        async function confirmarReponer() {
            const cantidad = parseInt(document.getElementById('cantidadReponer').value);

            if (!cantidad || cantidad < 1) {
                alert('Por favor ingresa una cantidad válida');
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/products/${productoSeleccionado}/reponer?cantidad=${cantidad}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al reponer stock');
                }

                mostrarExito(`✅ Stock repuesto exitosamente (+${cantidad} unidades)`);
                cerrarModalReponer();
                cargarProductos();

            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al reponer el stock');
            }
        }

        // EDITAR PRODUCTO
        function editarProducto(id) {
            window.location.href = `editar-producto.html?id=${id}`;
        }

        // ELIMINAR PRODUCTO
        async function eliminarProducto(id, nombre) {
            if (!confirm(`¿Estás seguro de eliminar "${nombre}"?\n\nEsta acción no se puede deshacer.`)) {
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/products/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al eliminar producto');
                }

                mostrarExito('✅ Producto eliminado exitosamente');
                cargarProductos();

            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al eliminar el producto');
            }
        }

        // MENSAJES
        function mostrarError(mensaje) {
            const container = document.getElementById('mensajes');
            container.innerHTML = `<div class="alert alert-danger">${mensaje}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function mostrarExito(mensaje) {
            const container = document.getElementById('mensajes');
            container.innerHTML = `<div class="alert alert-success">${mensaje}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('modalReponer');
            if (event.target == modal) {
                cerrarModalReponer();
            }
        }
    </script>
</body>
</html>
